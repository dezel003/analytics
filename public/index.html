<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex" />
<title>devonte.design · analytics</title>
<style>
  :root { --bg:#0b0d10; --panel:#14181d; --line:#232a31; --fg:#e7edf3; --muted:#8a97a6; --accent:#6ea8fe; }
  * { box-sizing:border-box; }
  body { margin:0; min-height:100vh; display:grid; place-items:center; background:var(--bg);
         color:var(--fg); font:15px/1.6 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; }
  .card { background:var(--panel); border:1px solid var(--line); border-radius:16px;
          padding:32px 36px; max-width:440px; width:calc(100% - 40px); }
  h1 { font-size:18px; margin:0 0 4px; }
  p { color:var(--muted); margin:0 0 20px; }
  .row { display:flex; gap:8px; }
  input { flex:1; background:var(--bg); color:var(--fg); border:1px solid var(--line);
          border-radius:10px; padding:10px 12px; font:inherit; }
  button { background:var(--accent); color:#06101f; border:0; border-radius:10px;
           padding:10px 18px; font:inherit; font-weight:600; cursor:pointer; }
  .dot { display:inline-block; width:8px; height:8px; border-radius:50%; background:#3ddc97;
         margin-right:7px; vertical-align:middle; }
  .status { font-size:13px; color:var(--muted); margin-top:18px; }
</style>
</head>
<body>
  <div class="card">
    <h1>devonte.design · analytics</h1>
    <p>First-party, cookieless. Enter your dashboard password.</p>
    <form class="row" onsubmit="go(event)">
      <input id="key" type="password" placeholder="Dashboard password" autocomplete="off" />
      <button type="submit">Open</button>
    </form>
    <div class="status"><span class="dot"></span>Collector live at <code>/api/collect</code></div>
  </div>
  <script>
    function go(e){
      e.preventDefault();
      var k = document.getElementById('key').value.trim();
      if (k) location.href = '/dashboard.html?key=' + encodeURIComponent(k);
    }
  </script>
</body>
</html>
